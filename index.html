<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyStream IPTV — Live TV</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a3d;
    --accent: #7c5cfc;
    --accent2: #fc5c7d;
    --text: #e8e8f0;
    --muted: #7a7a9a;
    --live: #ff4d6d;
    --radius: 12px;
    --sidebar: 280px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,-apple-system,sans-serif; min-height:100vh; overflow-x:hidden; }

  /* TOP NAV */
  .topnav {
    position:fixed; top:0; left:0; right:0; z-index:100;
    height:60px; background:rgba(10,10,15,0.95);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; padding:0 20px; gap:16px;
  }
  .logo { display:flex; align-items:center; gap:10px; }
  .logo-icon {
    width:36px; height:36px; border-radius:10px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex; align-items:center; justify-content:center;
    font-size:18px; flex-shrink:0;
  }
  .logo-text { font-size:18px; font-weight:700; letter-spacing:-0.5px; }
  .logo-text span { background:linear-gradient(90deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .search-wrap { flex:1; max-width:400px; position:relative; }
  .search-wrap input {
    width:100%; background:var(--surface); border:1px solid var(--border);
    border-radius:50px; padding:8px 16px 8px 40px;
    color:var(--text); font-size:14px; outline:none; transition:border 0.2s;
  }
  .search-wrap input:focus { border-color:var(--accent); }
  .search-wrap input::placeholder { color:var(--muted); }
  .search-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:15px; }
  .nav-count { margin-left:auto; font-size:12px; color:var(--muted); background:var(--surface); padding:4px 10px; border-radius:20px; border:1px solid var(--border); }
  .hamburger { display:none; background:none; border:none; color:var(--text); font-size:22px; cursor:pointer; }

  /* MAIN LAYOUT */
  .app { display:flex; padding-top:60px; height:100vh; }

  /* SIDEBAR */
  .sidebar {
    width:var(--sidebar); flex-shrink:0;
    background:var(--surface); border-right:1px solid var(--border);
    display:flex; flex-direction:column; position:fixed;
    top:60px; bottom:0; left:0; overflow:hidden; z-index:50;
    transition: transform 0.3s;
  }
  .categories { padding:12px; display:flex; flex-direction:column; gap:4px; }
  .cat-btn {
    display:flex; align-items:center; gap:10px;
    padding:10px 14px; border-radius:var(--radius);
    border:none; background:none; color:var(--muted);
    cursor:pointer; font-size:14px; text-align:left;
    transition:all 0.2s; width:100%;
  }
  .cat-btn:hover { background:var(--card); color:var(--text); }
  .cat-btn.active { background:linear-gradient(90deg,rgba(124,92,252,0.2),rgba(252,92,125,0.1)); color:var(--text); border-left:3px solid var(--accent); }
  .cat-btn .icon { font-size:16px; width:20px; text-align:center; }
  .cat-btn .badge { margin-left:auto; font-size:11px; background:var(--border); padding:2px 7px; border-radius:10px; }
  .cat-btn.active .badge { background:var(--accent); color:#fff; }
  .sidebar-divider { height:1px; background:var(--border); margin:8px 12px; }

  /* CHANNEL LIST */
  .channel-panel {
    flex:1; overflow-y:auto; padding:8px;
    scroll-behavior:smooth;
  }
  .channel-panel::-webkit-scrollbar { width:4px; }
  .channel-panel::-webkit-scrollbar-track { background:transparent; }
  .channel-panel::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  .ch-item {
    display:flex; align-items:center; gap:10px;
    padding:9px 12px; border-radius:10px;
    cursor:pointer; transition:all 0.15s;
    border:1px solid transparent;
  }
  .ch-item:hover { background:var(--card); border-color:var(--border); }
  .ch-item.active { background:rgba(124,92,252,0.15); border-color:var(--accent); }
  .ch-avatar {
    width:36px; height:36px; border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:700; flex-shrink:0;
    text-transform:uppercase; letter-spacing:-0.5px;
  }
  .ch-info { flex:1; min-width:0; }
  .ch-name { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ch-cat { font-size:11px; color:var(--muted); }
  .live-dot { width:7px; height:7px; border-radius:50%; background:var(--live); flex-shrink:0; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* MAIN CONTENT */
  .main { margin-left:var(--sidebar); flex:1; display:flex; flex-direction:column; overflow:hidden; }

  /* PLAYER */
  .player-wrap {
    background:#000; position:relative; overflow:hidden;
    aspect-ratio:16/9; max-height:calc(100vh - 60px - 160px);
    flex-shrink:0;
  }
  #player { width:100%; height:100%; display:block; }
  .player-overlay {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:rgba(0,0,0,0.7); flex-direction:column; gap:12px;
  }
  .play-circle {
    width:72px; height:72px; border-radius:50%;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex; align-items:center; justify-content:center;
    font-size:28px; cursor:pointer;
    box-shadow:0 0 40px rgba(124,92,252,0.5);
    transition:transform 0.2s;
  }
  .play-circle:hover { transform:scale(1.1); }
  .overlay-msg { font-size:14px; color:var(--muted); }
  .loading-ring {
    width:60px; height:60px; border-radius:50%;
    border:3px solid var(--border);
    border-top-color:var(--accent);
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  .now-playing-bar {
    background:linear-gradient(90deg,var(--surface),var(--card));
    border-bottom:1px solid var(--border);
    padding:10px 20px; display:flex; align-items:center; gap:14px;
    flex-shrink:0;
  }
  .np-badge { background:var(--live); color:#fff; font-size:10px; font-weight:700; padding:3px 7px; border-radius:4px; letter-spacing:1px; flex-shrink:0; }
  .np-name { font-size:16px; font-weight:600; flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .np-cat { font-size:12px; color:var(--muted); flex-shrink:0; }
  .fullscreen-btn {
    background:var(--border); border:none; color:var(--text);
    padding:6px 12px; border-radius:8px; cursor:pointer;
    font-size:13px; transition:background 0.2s;
  }
  .fullscreen-btn:hover { background:var(--accent); }

  /* GRID BELOW */
  .content-area { flex:1; overflow-y:auto; padding:16px 20px; }
  .content-area::-webkit-scrollbar { width:5px; }
  .content-area::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  .section-title {
    font-size:18px; font-weight:700; margin-bottom:14px;
    display:flex; align-items:center; gap:10px;
  }
  .section-title::after { content:''; flex:1; height:1px; background:var(--border); }
  .channel-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:12px; margin-bottom:24px;
  }
  .grid-card {
    background:var(--card); border:1px solid var(--border);
    border-radius:var(--radius); padding:14px 12px;
    cursor:pointer; transition:all 0.2s; text-align:center;
    display:flex; flex-direction:column; align-items:center; gap:8px;
  }
  .grid-card:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:0 8px 24px rgba(124,92,252,0.15); }
  .grid-card.active { border-color:var(--accent); background:rgba(124,92,252,0.12); }
  .grid-avatar {
    width:52px; height:52px; border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    font-size:16px; font-weight:700; text-transform:uppercase;
  }
  .grid-name { font-size:12px; font-weight:500; line-height:1.3; text-align:center; }
  .grid-live { display:flex; align-items:center; gap:4px; font-size:10px; color:var(--live); }

  /* CATEGORY COLORS */
  .c-bangla   { background:linear-gradient(135deg,#1a3a5c,#0d6a9f); }
  .c-news     { background:linear-gradient(135deg,#3a1a1a,#9f1a2a); }
  .c-kids     { background:linear-gradient(135deg,#1a3a1a,#2a8f2a); }
  .c-movies   { background:linear-gradient(135deg,#3a1a3a,#8f2a8f); }
  .c-music    { background:linear-gradient(135deg,#3a3a1a,#9f7a1a); }
  .c-sports   { background:linear-gradient(135deg,#1a3a3a,#1a8f8f); }
  .c-islamic  { background:linear-gradient(135deg,#1a2a1a,#2a6f4a); }
  .c-documentary { background:linear-gradient(135deg,#2a1a0a,#7f4f1a); }
  .c-entertainment { background:linear-gradient(135deg,#2a1a3a,#6f2a9f); }

  /* EMPTY STATE */
  .empty-state { text-align:center; padding:60px 20px; color:var(--muted); }
  .empty-state .icon { font-size:48px; margin-bottom:12px; }

  /* MOBILE */
  @media(max-width:768px){
    :root { --sidebar:260px; }
    .sidebar { transform:translateX(-100%); z-index:200; }
    .sidebar.open { transform:translateX(0); box-shadow:8px 0 30px rgba(0,0,0,0.6); }
    .main { margin-left:0; }
    .hamburger { display:block; }
    .player-wrap { aspect-ratio:16/9; }
    .channel-grid { grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); }
    .content-area { padding:12px; }
    .overlay { display:none; }
    .overlay.active { display:block; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:150; }
  }
</style>
</head>
<body>

<!-- TOP NAV -->
<nav class="topnav">
  <button class="hamburger" id="hamburger">☰</button>
  <div class="logo">
    <div class="logo-icon">📡</div>
    <div class="logo-text">Sky<span>Stream</span></div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search channels...">
  </div>
  <div class="nav-count" id="navCount"></div>
</nav>

<div class="overlay" id="overlay"></div>

<!-- APP -->
<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="categories" id="catList"></div>
    <div class="sidebar-divider"></div>
    <div class="channel-panel" id="chList"></div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <!-- PLAYER -->
    <div class="player-wrap" id="playerWrap">
      <video id="player" controls playsinline></video>
      <div class="player-overlay" id="playerOverlay">
        <div class="play-circle" id="playCircle">▶</div>
        <div class="overlay-msg">চ্যানেল সিলেক্ট করুন এবং দেখা শুরু করুন</div>
      </div>
    </div>

    <!-- NOW PLAYING BAR -->
    <div class="now-playing-bar" id="npBar" style="display:none">
      <div class="np-badge">● LIVE</div>
      <div class="np-name" id="npName">—</div>
      <div class="np-cat" id="npCat"></div>
      <button class="fullscreen-btn" id="fsBtn">⛶ Fullscreen</button>
    </div>

    <!-- GRID CONTENT -->
    <div class="content-area">
      <div id="gridSection"></div>
    </div>
  </main>
</div>

<script>
CHANNELS_PLACEHOLDER

const CATS = {
  'All':           { icon:'📺', label:'সব চ্যানেল' },
  'Bangla':        { icon:'🇧🇩', label:'বাংলা' },
  'News':          { icon:'📰', label:'নিউজ' },
  'Entertainment': { icon:'🎭', label:'এন্টারটেইনমেন্ট' },
  'Movies':        { icon:'🎬', label:'মুভিজ' },
  'Kids':          { icon:'🧸', label:'কিডস' },
  'Music':         { icon:'🎵', label:'মিউজিক' },
  'Sports':        { icon:'⚽', label:'স্পোর্টস' },
  'Documentary':   { icon:'🌍', label:'ডকুমেন্টারি' },
  'Islamic':       { icon:'🕌', label:'ইসলামিক' },
};

const catColors = {
  'Bangla':'c-bangla','News':'c-news','Kids':'c-kids','Movies':'c-movies',
  'Music':'c-music','Sports':'c-sports','Islamic':'c-islamic',
  'Documentary':'c-documentary','Entertainment':'c-entertainment'
};

function getColor(cat){ return catColors[cat]||'c-entertainment'; }

function initials(name){
  return name.replace(/^(BD|IN|ENT|MOV|MU|ENG|BHOJ)\s*\|\s*/i,'')
    .split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase()||'TV';
}

let activeCat = 'All';
let activeUrl = null;
let hls = null;
let searchQuery = '';

// Count by category
const catCounts = {All: CHANNELS.length};
CHANNELS.forEach(c => { catCounts[c.category] = (catCounts[c.category]||0)+1; });

// Render categories
function renderCats(){
  const el = document.getElementById('catList');
  el.innerHTML = '';
  Object.entries(CATS).forEach(([key,{icon,label}])=>{
    if(key!=='All' && !catCounts[key]) return;
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (activeCat===key?' active':'');
    btn.innerHTML = `<span class="icon">${icon}</span><span>${label}</span><span class="badge">${catCounts[key]||0}</span>`;
    btn.onclick = ()=>{ activeCat=key; renderAll(); closeSidebar(); };
    el.appendChild(btn);
  });
}

// Render sidebar channel list
function renderSidebar(channels){
  const el = document.getElementById('chList');
  el.innerHTML = '';
  channels.forEach(ch=>{
    const div = document.createElement('div');
    div.className = 'ch-item'+(activeUrl===ch.url?' active':'');
    div.innerHTML = `
      <div class="ch-avatar ${getColor(ch.category)}">${initials(ch.name)}</div>
      <div class="ch-info">
        <div class="ch-name">${ch.name}</div>
        <div class="ch-cat">${ch.category}</div>
      </div>
      <div class="live-dot"></div>`;
    div.onclick = ()=>{ playChannel(ch); };
    el.appendChild(div);
  });
}

// Render grid
function renderGrid(channels){
  const el = document.getElementById('gridSection');
  if(!channels.length){
    el.innerHTML = `<div class="empty-state"><div class="icon">📡</div><div>কোনো চ্যানেল পাওয়া যায়নি</div></div>`;
    return;
  }
  // Group by category if showing All
  if(activeCat==='All' && !searchQuery){
    let html = '';
    const grouped = {};
    channels.forEach(ch=>{ (grouped[ch.category]=grouped[ch.category]||[]).push(ch); });
    const order = ['Bangla','News','Entertainment','Movies','Kids','Music','Sports','Documentary','Islamic'];
    order.forEach(cat=>{
      if(!grouped[cat]) return;
      const info = CATS[cat]||{icon:'📺',label:cat};
      html += `<div class="section-title">${info.icon} ${info.label} <span style="font-size:12px;color:var(--muted);margin-left:6px;font-weight:400">(${grouped[cat].length})</span></div>`;
      html += `<div class="channel-grid">`;
      grouped[cat].forEach(ch=>{
        html += `<div class="grid-card${activeUrl===ch.url?' active':''}" onclick="playByUrl('${escUrl(ch.url)}','${escUrl(ch.name)}','${ch.category}')">
          <div class="grid-avatar ${getColor(ch.category)}">${initials(ch.name)}</div>
          <div class="grid-name">${ch.name}</div>
          <div class="grid-live"><span style="width:6px;height:6px;border-radius:50%;background:var(--live);display:inline-block"></span> LIVE</div>
        </div>`;
      });
      html += `</div>`;
    });
    el.innerHTML = html;
  } else {
    const catInfo = CATS[activeCat]||{icon:'📺',label:activeCat};
    let html = `<div class="section-title">${catInfo.icon} ${catInfo.label} <span style="font-size:12px;color:var(--muted);margin-left:6px;font-weight:400">(${channels.length})</span></div>`;
    html += `<div class="channel-grid">`;
    channels.forEach(ch=>{
      html += `<div class="grid-card${activeUrl===ch.url?' active':''}" onclick="playByUrl('${escUrl(ch.url)}','${escUrl(ch.name)}','${ch.category}')">
        <div class="grid-avatar ${getColor(ch.category)}">${initials(ch.name)}</div>
        <div class="grid-name">${ch.name}</div>
        <div class="grid-live"><span style="width:6px;height:6px;border-radius:50%;background:var(--live);display:inline-block"></span> LIVE</div>
      </div>`;
    });
    html += `</div>`;
    el.innerHTML = html;
  }
}

function escUrl(s){ return s.replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

function getFiltered(){
  let chs = CHANNELS;
  if(activeCat!=='All') chs = chs.filter(c=>c.category===activeCat);
  if(searchQuery) chs = chs.filter(c=>c.name.toLowerCase().includes(searchQuery.toLowerCase()));
  return chs;
}

function renderAll(){
  const filtered = getFiltered();
  document.getElementById('navCount').textContent = filtered.length + ' চ্যানেল';
  renderCats();
  renderSidebar(filtered);
  renderGrid(filtered);
}

function playByUrl(url, name, cat){
  const ch = {url, name, category:cat};
  playChannel(ch);
}

function playChannel(ch){
  activeUrl = ch.url;
  renderAll();

  const video = document.getElementById('player');
  const overlay = document.getElementById('playerOverlay');
  const npBar = document.getElementById('npBar');

  // Show loading
  overlay.innerHTML = `<div class="loading-ring"></div><div class="overlay-msg">লোড হচ্ছে — ${ch.name}</div>`;
  npBar.style.display = 'flex';
  document.getElementById('npName').textContent = ch.name;
  document.getElementById('npCat').textContent = ch.category;

  if(hls){ hls.destroy(); hls = null; }
  video.src = '';

  if(Hls.isSupported()){
    hls = new Hls({
      maxBufferLength: 60,
      maxMaxBufferLength: 120,
      maxBufferSize: 60*1000*1000,
      maxBufferHole: 0.5,
      lowLatencyMode: false,
      progressive: true,
      enableWorker: true,
      startLevel: -1,
      abrEwmaDefaultEstimate: 1500000,
      testBandwidth: true,
    });
    hls.loadSource(ch.url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, ()=>{
      overlay.style.display='none';
      video.play().catch(()=>{});
    });
    hls.on(Hls.Events.ERROR, (e,data)=>{
      if(data.fatal){
        overlay.innerHTML = `<div style="font-size:36px">⚠️</div><div class="overlay-msg">স্ট্রিম লোড হয়নি। অন্য চ্যানেল ট্রাই করুন।</div>`;
        overlay.style.display='flex';
      }
    });
  } else if(video.canPlayType('application/vnd.apple.mpegurl')){
    video.src = ch.url;
    video.addEventListener('loadedmetadata', ()=>{ overlay.style.display='none'; video.play(); }, {once:true});
    video.addEventListener('error', ()=>{
      overlay.innerHTML = `<div style="font-size:36px">⚠️</div><div class="overlay-msg">এই ডিভাইসে চলছে না।</div>`;
      overlay.style.display='flex';
    }, {once:true});
  }

  // Scroll sidebar to active
  setTimeout(()=>{
    const active = document.querySelector('.ch-item.active');
    if(active) active.scrollIntoView({block:'nearest',behavior:'smooth'});
  }, 100);
}

// Fullscreen
document.getElementById('fsBtn').onclick = ()=>{
  const pw = document.getElementById('playerWrap');
  if(document.fullscreenElement) document.exitFullscreen();
  else pw.requestFullscreen();
};

// Keyboard shortcut F for fullscreen
document.addEventListener('keydown', e=>{
  if(e.key==='f'||e.key==='F'){
    const pw = document.getElementById('playerWrap');
    if(document.fullscreenElement) document.exitFullscreen();
    else pw.requestFullscreen();
  }
});

// Search
document.getElementById('searchInput').addEventListener('input', e=>{
  searchQuery = e.target.value;
  renderAll();
});

// Mobile hamburger
document.getElementById('hamburger').onclick = ()=>{
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('active');
};
document.getElementById('overlay').onclick = ()=>{ closeSidebar(); };
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('active');
}

// Init
renderAll();
</script>
</body>
</html>
